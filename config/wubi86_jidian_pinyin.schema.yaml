# Rime schema settings
# encoding: utf-8

schema:
  schema_id: wubi86_jidian_pinyin
  name: "拼音混输"
  version: "0.9"
  author:
    - 发明人 王永民先生
  description: |
    五笔字形 86 极点极爽版，方案由 KyleBing 修改 - 2019年11月08日 10:26
  dependencies:
    - pinyin_simp

switches:
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: extended_charset
    states: [ 常用, 扩展 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
    - lua_processor@*wubi_save_word
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
  filters:
    - lua_filter@*wubi86_jidian_pinyin_code_hint  # 拼音输入时补充显示五笔编码

speller:

translator:
  dictionary: wubi86_jidian             # 翻译器将调取此字典文件
  enable_charset_filter: true           # 开启字符集过滤
  enable_completion: true               # 提前显示编码未输入完整的词条
  comment_format:
    - xform/^([a-z]+)$/[$1]/            # 五笔编码提示，格式：[编码]，空码不显示

  enable_sentence: false                # 句子输入模式
  enable_user_dict: true                # 开启用户词典（记录词频和动态学习）
  enable_encoder: true                  # 自动造词
  encode_commit_history: true           # 上屏后自动记忆新词，下次可直接用五笔打出

  max_phrase_length: 10                 # 自动生成词的最大长度
  user_dict: user                       # 用户词典名
  db_class: tabledb                     # 用户词典类型 userdb - 二进制 / tabledb - 人类语言
  disable_user_dict_for_patterns:       # 不需要录入用户词典的编码
    - "^z.*$"

# 输入的编码同时进行拼音反查，实现五笔与拼音的混输
abc_segmentor:
  extra_tags:
    - reverse_lookup

reverse_lookup:
  dictionary: pinyin_simp
  comment_format:
    - xform/^([a-z]+)$/[$1]/            # 有五笔码时显示，空码交给 Lua filter 处理
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default

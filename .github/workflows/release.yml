name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: macos-latest

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare signing certificate
        id: cert
        run: |
          echo "$CSC_LINK_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "path=$RUNNER_TEMP/cert.p12" >> "$GITHUB_OUTPUT"
        env:
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK }}

      - name: Build & publish (arm64 + x64)
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ steps.cert.outputs.path }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Clean up certificate
        if: always()
        run: rm -f "$RUNNER_TEMP/cert.p12"
